<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>기초대사량 계산기</title>

  <style>
    *{
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body{
        background-color: #ffe6fd;
        font-family: sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
    }

    .container{
        background-color: white;
        border-radius: 12px;
        padding: 40px;
        width: 360px;
    }

    h1{
        font-size: 1.5rem;
        color: #333;
        margin-bottom: 20px;
        text-align: center;
    }

    .gender-title{
        font-size: 1rem;
        margin-bottom: 6px;
    }

    .gender-group {
        display: flex;
        gap: 12px;
        margin-bottom: 16px;
    }

    .gender-group input[type="radio"]{
        display: none; /*라벨로 대체*/
    }

    .gender-group label{
        flex: 1;
        text-align: center;
        padding: 10px;
        border: 1px solid #ddd;
        border-radius: 8px;
        cursor: pointer;
        font-size: 0.9rem;
        color: #555;
    }

    .gender-group input[type="radio"]:checked + label {
        background-color: #4a90e2; /* 선택되면 배경 파란색 */
        color: white;              /* 글자 흰색 */
        border-color: #4a90e2;     /* 테두리도 파란색 */
    }

    input[type="number"]{
        width: 100%;
        padding: 8px 12px;
        border: 1px solid #ddd;
        border-radius: 8px;
        font-size: 1rem;
        margin-bottom: 10px;
    }

    button{
        width: 100%;
        padding: 12px;
        background-color: #4a90e2;
        color: white;
        border: none;
        border-radius: 8px;
        font-size: 0.9rem;
        cursor: pointer;
        margin-top: 24px;
    }

    button:hover {
        background-color: #357abd;;
    }



  </style>
</head>

<body>
  <div class="container">
    <h1>기초대사량 계산기</h1>

    <!-- 성별 -->
    <div class="gender-title">성별</div>
    <div class="gender-group">
      <input type="radio" id="male" name="gender" value="male" checked>
      <label for="male">남자</label>
      <input type="radio" id="female" name="gender" value="female">
      <label for="female">여자</label>
    </div>

    <!-- 키 -->
    <label class="input-label" for="height">키 (cm)</label>
    <input type="number" id="height">

    <!-- 몸무게 -->
    <label class="input-label" for="weight">몸무게 (kg)</label>
    <input type="number" id="weight">

    <!-- 나이 -->
    <label class="input-label" for="age">나이 (세)</label>
    <input type="number" id="age">

    <!-- 버튼 -->
    <button onclick="calculate()">계산하기</button>

    <!-- 결과 -->
    <p id="result"></p>

  </div>

  <script>
    function calculate() {
      const height = document.getElementById("height").value;
      const weight = document.getElementById("weight").value;
      const age = document.getElementById("age").value;
      const gender = document.getElementById("gender").value;

      let bmr;

      if (gender === "male") {
        bmr = 10 * weight + 6.25 * height - 5 * age + 5;
      } else {
        bmr = 10 * weight + 6.25 * height - 5 * age - 161;
      }

      document.getElementById("result").innerText =
        "결과: " + Math.round(bmr) + " kcal"; //round는 반올림 함수
    }
  </script>
</body>
</html>

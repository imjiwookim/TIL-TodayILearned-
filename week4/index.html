<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>아기사자 대시보드</title>
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>

  <!-- ① 상단 컨트롤 영역 -->
  <header class="top-bar">
    <div class="top-bar-left">
      <span class="logo">🦁 LION TRACK</span>
      <span class="member-count">총 <strong id="memberCount">0</strong>명</span>
    </div>
    <div class="top-bar-right">
      <button class="btn btn-add" id="toggleFormBtn" onclick="toggleForm()">+ 아기사자 추가</button>
      <button class="btn btn-delete" onclick="deleteLastMember()">− 마지막 삭제</button>
    </div>
  </header>

  <!-- ② 외부 데이터 불러오기 컨트롤 영역 -->
  <div class="fetch-bar">
    <div class="fetch-bar-inner">
      <div class="fetch-buttons">
        <button class="btn btn-fetch" id="btn-add1" onclick="fetchAndAdd(1)">＋ 랜덤 1명 추가</button>
        <button class="btn btn-fetch" id="btn-add5" onclick="fetchAndAdd(5)">＋＋ 랜덤 5명 추가</button>
        <button class="btn btn-refresh" id="btn-refresh" onclick="fetchAndRefresh()">🔄 전체 새로고침</button>
      </div>
      <div class="fetch-status" id="fetchStatus">
        <span class="status-dot ready" id="statusDot"></span>
        <span id="statusText">준비 완료</span>
        <button class="btn btn-retry" id="retryBtn" onclick="retryLastAction()" style="display:none">↺ 재시도</button>
      </div>
    </div>
  </div>

  <!-- ③ 보기 옵션 영역 -->
  <div class="view-options">
    <div class="view-options-inner">
      <div class="filter-group">
        <label class="opt-label">파트</label>
        <div class="part-filters">
          <button class="filter-btn active" data-part="전체" onclick="setPartFilter(this)">전체</button>
          <button class="filter-btn" data-part="Frontend" onclick="setPartFilter(this)">Frontend</button>
          <button class="filter-btn" data-part="Backend" onclick="setPartFilter(this)">Backend</button>
          <button class="filter-btn" data-part="Design" onclick="setPartFilter(this)">Design</button>
        </div>
      </div>
      <div class="filter-group">
        <label class="opt-label">정렬</label>
        <select class="opt-select" id="sortSelect" onchange="applyViewOptions()">
          <option value="latest">최신 추가순</option>
          <option value="name">이름순</option>
        </select>
      </div>
      <div class="filter-group search-group">
        <label class="opt-label">검색</label>
        <div class="search-wrap">
          <span class="search-icon">🔍</span>
          <input type="text" class="opt-search" id="searchInput" placeholder="이름으로 검색..." oninput="applyViewOptions()" />
        </div>
      </div>
    </div>
  </div>

  <!-- ④ 추가 폼 영역 -->
  <section class="form-section" id="formSection">
    <div class="form-wrapper">
      <div class="form-title-row">
        <h2 class="form-title">새 아기사자 추가</h2>
        <button class="btn btn-random-fill" id="randomFillBtn" onclick="fillFormRandom()">🎲 랜덤 값 채우기</button>
      </div>
      <div class="form-grid">
        <div class="form-group">
          <label>이름 *</label>
          <input type="text" id="f-name" placeholder="홍길동" />
        </div>
        <div class="form-group">
          <label>파트 *</label>
          <select id="f-part">
            <option value="Frontend">Frontend</option>
            <option value="Backend">Backend</option>
            <option value="Design">Design</option>
          </select>
        </div>
        <div class="form-group">
          <label>한 줄 소개 *</label>
          <input type="text" id="f-shortIntro" placeholder="요약 카드에 표시될 한 줄 소개" />
        </div>
        <div class="form-group">
          <label>관심 기술 (쉼표로 구분) *</label>
          <input type="text" id="f-skills" placeholder="React, TypeScript, Next.js" />
        </div>
        <div class="form-group full-width">
          <label>자기소개</label>
          <textarea id="f-intro" rows="3" placeholder="상세 카드에 표시될 자기소개를 입력하세요"></textarea>
        </div>
        <div class="form-group">
          <label>이메일</label>
          <input type="email" id="f-email" placeholder="example@email.com" />
        </div>
        <div class="form-group">
          <label>전화번호</label>
          <input type="tel" id="f-phone" placeholder="010-0000-0000" />
        </div>
        <div class="form-group">
          <label>웹사이트 / GitHub</label>
          <input type="text" id="f-website" placeholder="github.com/username" />
        </div>
        <div class="form-group">
          <label>한 마디</label>
          <input type="text" id="f-lastword" placeholder="각오 한 마디!" />
        </div>
      </div>
      <div class="form-actions">
        <button class="btn btn-add" onclick="addMember()">추가하기</button>
        <button class="btn btn-cancel" onclick="toggleForm()">취소</button>
      </div>
    </div>
  </section>

  <!-- ⑤ 요약 카드 그리드 -->
  <main>
    <section class="section-block">
      <h2 class="section-title">멤버 소개</h2>
      <div class="card-grid" id="cardGrid">
        <!-- 초기 카드 데이터 (script.js에서 읽어 초기화) -->
        <div class="card my-card"
          data-id="1" data-name="김아기사자" data-part="Frontend"
          data-short-intro="프론트엔드 개발에 관심이 많습니다"
          data-skills="React,JavaScript,HTML/CSS"
          data-intro="안녕하세요 김아기사자입니다. 프론트엔드에 관심이 생겨서 공부를 시작했습니다."
          data-email="kim@example.com" data-phone="010-1111-2222"
          data-website="github.com/kim" data-lastword="열심히 하겠습니다!"
          data-is-me="true" data-seed="aa">
        </div>
        <div class="card"
          data-id="2" data-name="박아기사자" data-part="Backend"
          data-short-intro="서버 개발을 공부하고 있습니다"
          data-skills="Spring,Java,MySQL"
          data-intro="안녕하세요 박아기사자입니다. 백엔드 개발에 관심이 많습니다."
          data-email="park@example.com" data-phone="010-2222-3333"
          data-website="github.com/park" data-lastword="잘 부탁드립니다!"
          data-is-me="false" data-seed="bb">
        </div>
        <div class="card"
          data-id="3" data-name="이아기사자" data-part="Design"
          data-short-intro="UI 디자인을 좋아합니다"
          data-skills="Figma,Photoshop,Illustrator"
          data-intro="안녕하세요 이아기사자입니다. 디자인을 배우고 있습니다."
          data-email="lee@example.com" data-phone="010-3333-4444"
          data-website="github.com/lee" data-lastword="예쁜 디자인 만들겠습니다!"
          data-is-me="false" data-seed="cc">
        </div>
        <div class="card"
          data-id="4" data-name="최아기사자" data-part="Frontend"
          data-short-intro="타입스크립트를 공부중입니다"
          data-skills="TypeScript,React,Next.js"
          data-intro="안녕하세요 최아기사자입니다. 타입스크립트를 열심히 공부하고 있습니다."
          data-email="choi@example.com" data-phone="010-4444-5555"
          data-website="github.com/choi" data-lastword="꾸준히 성장하겠습니다!"
          data-is-me="false" data-seed="dd">
        </div>
        <div class="card"
          data-id="5" data-name="정아기사자" data-part="Backend"
          data-short-intro="백엔드 개발자를 꿈꿉니다"
          data-skills="Node.js,Express,MongoDB"
          data-intro="안녕하세요 정아기사자입니다. Node.js로 서버를 만드는 걸 배우고 있습니다."
          data-email="jung@example.com" data-phone="010-5555-6666"
          data-website="github.com/jung" data-lastword="백엔드 마스터가 되겠습니다!"
          data-is-me="false" data-seed="ee">
        </div>
        <div class="card"
          data-id="6" data-name="오아기사자" data-part="Design"
          data-short-intro="예쁜 디자인을 만들고 싶습니다"
          data-skills="Figma,Design System,Storybook"
          data-intro="안녕하세요 오아기사자입니다. 디자인 시스템에 관심이 생겼습니다."
          data-email="oh@example.com" data-phone="010-6666-7777"
          data-website="github.com/oh" data-lastword="열심히 배우겠습니다!"
          data-is-me="false" data-seed="ff">
        </div>
      </div>
      <div class="empty-state" id="cardEmpty" style="display:none">
        <span class="empty-icon">🔍</span>
        <p>표시할 아기 사자가 없습니다. (필터/검색 조건을 확인해 주세요)</p>
      </div>
    </section>

    <hr class="divider" />

    <!-- ⑥ 상세 카드 목록 -->
    <section class="section-block">
      <h2 class="section-title">상세 소개</h2>
      <div id="detailList"></div>
      <div class="empty-state" id="detailEmpty" style="display:none">
        <span class="empty-icon">📭</span>
        <p>표시할 아기 사자가 없습니다. (필터/검색 조건을 확인해 주세요)</p>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
